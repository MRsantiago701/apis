<!DOCTYPE html>
<html>
<head>
  <title>Catálogo Streaming</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; }
    .card { background:#222; border-radius:8px; padding:10px; margin:10px; width:200px; display:inline-block; vertical-align:top; }
    img { width:100%; border-radius:6px; }
    h3 { font-size:16px; margin:5px 0; }
    p { font-size:12px; color:#aaa; }
  </style>
</head>
<body>
  <h1>Catálogo de Series</h1>
  <input type="text" id="search" placeholder="Buscar serie..." style="padding:8px; width:300px;">
  <div id="catalog"></div>

  <script>
    let shows = [];

    // Cargar datos desde backend
    fetch("http://localhost:3004/shows")
      .then(res => res.json())
      .then(data => {
        shows = data;
        renderCatalog(shows);
      });

    // Renderizar catálogo
    function renderCatalog(list) {
      const container = document.getElementById("catalog");
      container.innerHTML = "";
      list.slice(0,20).forEach(show => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${show.image?.medium}" alt="${show.name}">
          <h3>${show.name}</h3>
          <p>${show.genres.join(", ")}</p>
        `;
        container.appendChild(card);
      });
    }

    // Buscador en tiempo real
    document.getElementById("search").addEventListener("input", e => {
      const term = e.target.value.toLowerCase();
      const filtered = shows.filter(s => s.name.toLowerCase().includes(term));
      renderCatalog(filtered);
    });
  </script>
</body>
</html>
